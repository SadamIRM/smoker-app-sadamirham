name: smoker_app
description: "A new Flutter project."

# Prevent publish ke pub.dev (biar aman untuk project pribadi)
publish_to: "none"

# Versi aplikasi
version: 1.0.0+1

# Environment SDK
environment:
  sdk: ^3.9.2

# ======================
# DEPENDENCIES (runtime)
# ======================
dependencies:
  flutter:
    sdk: flutter

  # iOS style icons
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0

# ======================
# DEV DEPENDENCIES
# ======================
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint rules
  flutter_lints: ^5.0.0

# ======================
# FLUTTER CONFIG
# ======================
flutter:
  uses-material-design: true

  # ======================
  # ASSETS (kalau ada)
  # ======================
  # assets:
  #   - images/
  #   - assets/icons/

